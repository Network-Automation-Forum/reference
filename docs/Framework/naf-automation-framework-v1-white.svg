<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Inter, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="s2shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.09)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" rx="0" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B" letter-spacing="0.5">Network Automation Framework</text>
  <text x="450" y="58" text-anchor="middle" font-size="10" fill="#94A3B8" letter-spacing="2">REFERENCE ARCHITECTURE</text>

  <!-- === PRESENTATION — #f5c518 NAF Yellow === -->
  <rect x="55" y="78" width="790" height="72" rx="14" fill="#f5c518" filter="url(#s2shadow)"/>
  <svg x="350" y="93" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2"/>
    <line x1="8" y1="21" x2="16" y2="21"/>
    <line x1="12" y1="17" x2="12" y2="21"/>
  </svg>
  <text x="450" y="112" text-anchor="middle" font-size="17" font-weight="700" fill="#000000">PRESENTATION</text>
  <text x="450" y="132" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.6)" letter-spacing="0.5">Dashboards  ·  CLI  ·  ITSM Integration  ·  API Gateway  ·  ChatOps</text>

  <!-- Flow connectors: Presentation → Middle -->
  <path d="M180,150 L180,170 L195,185" stroke="rgba(245,197,24,0.31)" stroke-width="2" fill="none"/>
  <path d="M450,150 L450,185" stroke="rgba(245,197,24,0.31)" stroke-width="2" fill="none"/>
  <path d="M720,150 L720,170 L705,185" stroke="rgba(245,197,24,0.31)" stroke-width="2" fill="none"/>

  <!-- === OBSERVABILITY — #00e676 Vivid Green === -->
  <rect x="55" y="185" width="250" height="145" rx="14" fill="#00e676" filter="url(#s2shadow)"/>
  <svg x="107" y="198" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <text x="195" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#000000">OBSERVABILITY</text>
  <rect x="72" y="228" width="216" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="180" y="252" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Observed State · Data Normalization</text>
  <rect x="72" y="274" width="216" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="180" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Observed Logic &amp; Analytics</text>

  <!-- === ORCHESTRATION — #00d4ff Electric Cyan === -->
  <rect x="325" y="185" width="250" height="145" rx="14" fill="#00d4ff" filter="url(#s2shadow)"/>
  <svg x="375" y="198" width="22" height="22" viewBox="0 0 24 24">
    <rect x="4" y="4" width="6" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="14" y="4" width="6" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="4" y="14" width="6" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="14" y="14" width="6" height="6" rx="2" fill="#000000"/>
    <path d="M10 7h4M7 10v4M17 10v4" stroke="#000000" stroke-width="1.5" fill="none"/>
  </svg>
  <text x="465" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#000000">ORCHESTRATION</text>
  <rect x="342" y="228" width="105" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="394" y="252" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Events</text>
  <rect x="453" y="228" width="105" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="505" y="252" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Workflows</text>
  <rect x="342" y="274" width="105" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="394" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Rollback</text>
  <rect x="453" y="274" width="105" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="505" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Scheduling</text>

  <!-- === INTENT — #ff6d2e Hot Orange === -->
  <rect x="595" y="185" width="250" height="145" rx="14" fill="#ff6d2e" filter="url(#s2shadow)"/>
  <svg x="652" y="198" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.8">
    <path d="M12 3L2 9l10 6 10-6-10-6z"/>
    <path d="M2 15l10 6 10-6" stroke-dasharray="3,2"/>
  </svg>
  <text x="735" y="216" text-anchor="middle" font-size="15" font-weight="700" fill="#000000">INTENT</text>
  <rect x="612" y="228" width="216" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="720" y="252" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Intended State (SoT)</text>
  <rect x="612" y="274" width="216" height="38" rx="8" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.13)" stroke-width="1"/>
  <text x="720" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="rgba(0,0,0,0.8)">Intended Logic &amp; Validation</text>

  <!-- Horizontal connectors between middle blocks -->
  <line x1="305" y1="250" x2="325" y2="250" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
  <line x1="305" y1="260" x2="325" y2="260" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
  <line x1="575" y1="250" x2="595" y2="250" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>
  <line x1="575" y1="260" x2="595" y2="260" stroke="rgba(0,0,0,0.13)" stroke-width="2"/>

  <!-- Flow connectors: Middle → Collector/Executor -->
  <path d="M180,330 L180,365" stroke="rgba(244,63,94,0.45)" stroke-width="2" fill="none"/>
  <path d="M450,330 L310,365" stroke="rgba(0,212,255,0.25)" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <path d="M450,330 L590,365" stroke="rgba(0,212,255,0.25)" stroke-width="1.5" fill="none" stroke-dasharray="4,4"/>
  <path d="M720,330 L720,365" stroke="rgba(99,102,241,0.45)" stroke-width="2" fill="none"/>

  <!-- === COLLECTOR — Rose Red #F43F5E === -->
  <rect x="100" y="365" width="310" height="90" rx="14" fill="#F43F5E" filter="url(#s2shadow)"/>
  <svg x="190" y="384" width="24" height="24" viewBox="0 0 24 24" fill="rgba(0,0,0,0.73)">
    <path d="M5 10l7-7 7 7" opacity="0.4"/>
    <path d="M5 14l7-7 7 7" opacity="0.7"/>
    <path d="M5 18l7-7 7 7"/>
  </svg>
  <text x="270" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#000000">COLLECTOR</text>
  <text x="255" y="422" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.67)" letter-spacing="0.3">Read Operations</text>
  <text x="255" y="443" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.67)">▲ READ FROM INFRASTRUCTURE</text>

  <!-- === EXECUTOR — Indigo #6366F1 === -->
  <rect x="490" y="365" width="310" height="90" rx="14" fill="#6366F1" filter="url(#s2shadow)"/>
  <svg x="583" y="384" width="24" height="24" viewBox="0 0 24 24" fill="rgba(0,0,0,0.73)">
    <path d="M5 6l7 7 7-7" opacity="0.4"/>
    <path d="M5 10l7 7 7-7" opacity="0.7"/>
    <path d="M5 14l7 7 7-7"/>
  </svg>
  <text x="660" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#000000">EXECUTOR</text>
  <text x="645" y="422" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.67)" letter-spacing="0.3">Write Operations · Idempotent · Dry-Run</text>
  <text x="645" y="443" text-anchor="middle" font-size="10" fill="rgba(0,0,0,0.67)">▼ WRITE TO INFRASTRUCTURE</text>

  <!-- Flow connectors: Collector/Executor → Infrastructure -->
  <path d="M255,455 L255,480" stroke="rgba(244,63,94,0.45)" stroke-width="2" fill="none"/>
  <path d="M645,455 L645,480" stroke="rgba(99,102,241,0.45)" stroke-width="2" fill="none"/>

  <!-- === INFRASTRUCTURE — Gray #64748B === -->
  <rect x="55" y="480" width="790" height="72" rx="14" fill="#64748B" filter="url(#s2shadow)"/>
  <svg x="340" y="494" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.8">
    <circle cx="12" cy="12" r="3"/>
    <circle cx="5" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
    <circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
    <line x1="6.5" y1="6.5" x2="10" y2="10"/>
    <line x1="17.5" y1="6.5" x2="14" y2="10"/>
    <line x1="6.5" y1="17.5" x2="10" y2="14"/>
    <line x1="17.5" y1="17.5" x2="14" y2="14"/>
  </svg>
  <text x="450" y="513" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">INFRASTRUCTURE</text>
  <text x="450" y="533" text-anchor="middle" font-size="10" fill="#94A3B8" letter-spacing="0.5">Routers  ·  Switches  ·  Firewalls  ·  Load Balancers  ·  SD-WAN  ·  Cloud Fabric  ·  Compute  ·  DPU</text>

  <!-- NAF watermark -->
  <text x="845" y="580" text-anchor="end" font-size="8" fill="#CBD5E1">NAF Reference Architecture</text>
</svg>