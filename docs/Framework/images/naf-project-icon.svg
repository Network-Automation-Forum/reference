<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="iconShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- LAYER 1 — PRESENTATION -->
  <rect x="48" y="48" width="416" height="95" rx="16" fill="#f5c518" filter="url(#iconShadow)"/>

  <!-- LAYER 2 — Three logic blocks -->
  <rect x="48" y="155" width="128" height="95" rx="16" fill="#00e676" filter="url(#iconShadow)"/>
  <rect x="192" y="155" width="128" height="95" rx="16" fill="#00d4ff" filter="url(#iconShadow)"/>
  <rect x="336" y="155" width="128" height="95" rx="16" fill="#ff6d2e" filter="url(#iconShadow)"/>

  <!-- LAYER 3 — Collector & Executor -->
  <rect x="72" y="262" width="168" height="95" rx="16" fill="#F43F5E" filter="url(#iconShadow)"/>
  <rect x="272" y="262" width="168" height="95" rx="16" fill="#6366F1" filter="url(#iconShadow)"/>

  <!-- LAYER 4 — INFRASTRUCTURE -->
  <rect x="48" y="369" width="416" height="95" rx="16" fill="#64748b" filter="url(#iconShadow)"/>
</svg>